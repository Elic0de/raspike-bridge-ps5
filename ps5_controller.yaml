bindings:
  combos:
    - keys: [BTN_TL, BTN_TR]
      action: toggle_safe_mode

  BTN_SOUTH:
    press:
      action: center_button
    hold:
      duration_ms: 1500
      action: emergency_stop

  BTN_NORTH:
    press:
      action: gyro_reset

  BTN_START:
    press:
      action: start

  BTN_EAST:
    press:
      action: virtual_force_touch
  dpad_left:
    press:
      action: button_left
  dpad_right:
    press:
      action: button_right

  space:
    press:
      action: emergency_stop
  r:
    press:
      action: gyro_reset
  enter:
    press:
      action: start
  c:
    press:
      action: coast_stop
  f:
    press:
      action: virtual_force_touch
  left:
    press:
      action: button_left
  right:
    press:
      action: button_right
  x:
    press:
      action: center_button

input:
  deadzone: 0.06
  steering_curve: 2.1
  throttle_curve: 1.7
  steering_gain: 1.35
  steering_return_speed: 4.5
  low_speed_steer_gain: 1.35
  high_speed_steer_gain: 0.75

power:
  slew_rate: 180
